name: RSS-triggered NEWS story image

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check blog RSS
        run: python check_rss.py

      - name: Read latest URL
        run: echo "LATEST_URL=$(cat latest_url_news.txt)" >> $GITHUB_ENV

      - name: Read new item flag
        run: echo "NEW_ITEM=$(cat new_item_news.txt)" >> $GITHUB_ENV

      - name: Generate image
        if: env.NEW_ITEM == 'yes'
        run: python instagram_story_news.py

      - name: Send to Discord
        if: env.NEW_ITEM == 'yes'
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -X POST \
            -F "payload_json={\"content\":\"New blog post detected. Latest post: $LATEST_URL\"}" \
            -F 'file1=@output/instagram_news_latest.png' \
            "$WEBHOOK_URL"

      - name: Configure git
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: success()
        run: |
          git add last_seen_news.txt latest_url_news.txt new_item_news.txt
          git commit -m "Update last seen feed item" || exit 0
          git push
