name: RSS-triggered NEWS story image

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check blog RSS
        run: python check_rss.py

      - name: Read latest URL news
        run: echo "LATEST_URL_NEWS=$(cat latest_url_news.txt)" >> $GITHUB_ENV

      - name: Generate image
        run: python instagram_story_news.py

      - name: Send to Discord
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          curl -X POST \
            -F "payload_json={\"content\":\"Manual RSS run. Latest post: $LATEST_URL_NEWS\"}" \
            -F 'file1=@output/instagram_news_latest.png' \
            "$WEBHOOK_URL"
